name: 🍿 Process Snack Contributions

on:
  # contributions/ 파일이 직접 push될 때
  push:
    branches: [main, master]
    paths:
      - "contributions/**"

  # PR이 머지될 때
  pull_request:
    types: [closed]
    branches: [main, master]
    paths:
      - "contributions/**"

  # 수동 실행도 허용 (테스트·재계산용)
  workflow_dispatch:

jobs:
  process-snacks:
    runs-on: ubuntu-latest

    # PR 이벤트면 머지된 경우만 / push면 봇 커밋 제외
    if: "(github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')) || github.event_name == 'workflow_dispatch'"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # PR 머지 시 PR 브랜치 HEAD가 아닌 실제 merge commit을 체크아웃
          # → 베이스 브랜치(master)의 최신 snacks.json 캐시 포함
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install openai

      - name: Process snack contributions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/process_snack.py

      - name: Commit & push updated README and data
        run: |
          git config user.name  "Snack Bot 🍿"
          git config user.email "snack-bot@users.noreply.github.com"
          git add data/snacks.json assets/histogram.svg assets/consumed.svg assets/inventory.svg README.md
          # 변경이 없으면 커밋하지 않음
          git diff --staged --quiet && echo "변경 없음, 스킵" && exit 0
          git commit -m "🍿 Update snack rankings [skip ci]"
          git pull --rebase origin master
          git push origin HEAD:master
